<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">

    <title>最終Boss - 樂府詩鑑賞大師 | 木蘭詩偵探</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <style>
        /* Boss專屬樣式 */
        .boss-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(240, 147, 251, 0.3);
            animation: bossPulse 3s infinite;
        }
        
        @keyframes bossPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(240, 147, 251, 0.3); }
            50% { transform: scale(1.02); box-shadow: 0 15px 50px rgba(240, 147, 251, 0.5); }
        }
        
        .boss-icon {
            font-size: 5em;
            margin-bottom: 15px;
        }
        
        .boss-title {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .boss-subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .challenge-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .final-question {
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.2), rgba(245, 87, 108, 0.2));
            border: 2px solid rgba(240, 147, 251, 0.5);
        }
        
        .victory-screen {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        
        .victory-icon {
            font-size: 6em;
            margin-bottom: 20px;
            animation: trophyBounce 1s ease infinite;
        }
        
        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .certificate {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .certificate h3 {
            text-align: center;
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .certificate-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
        }
        
        .certificate-row:last-child {
            border-bottom: none;
        }
        
        .seal {
            width: 80px;
            height: 80px;
            background: #f45c43;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin: 20px auto;
            transform: rotate(-15deg);
            border: 3px solid #ffd700;
        }
        
        .skill-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .skill-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>

    <div class="container">

        </div>
        
        <!-- 題目區域 -->
        <div id="question-container">
            <!-- 動態載入 -->
        </div>
        
        <!-- 勝利畫面 -->
        <div id="victory-screen" style="display: none;">

                <h2>恭喜成為樂府詩鑑賞大師！</h2>
                <p style="margin: 15px 0; font-size: 1.1em;">你已通過所有考驗，完成《木蘭詩》體裁探究之旅！</p>
                
                <div class="skill-badges">
                    <span class="skill-badge">🎵 韻律掌握</span>
                    <span class="skill-badge">🔄 復沓運用</span>
                    <span class="skill-badge">🔀 互文理解</span>
                    <span class="skill-badge">⚖️ 詳略分析</span>
                    <span class="skill-badge">⚡ 對偶創作</span>
                </div>
                
                <div class="certificate">
                    <h3>🎓 鑑賞大師證書</h3>
                    <div class="certificate-row">
                        <span>姓名</span>
                        <strong id="cert-name">-</strong>
                    </div>
                    <div class="certificate-row">
                        <span>班別</span>
                        <strong id="cert-class">-</strong>

                    <div class="certificate-row">
                        <span>最終積分</span>

                    <div class="certificate-row">
                        <span>完成時間</span>
                        <strong id="cert-date">-</strong>
                    </div>
                    <div class="seal">鑑賞<br>大師</div>
                </div>
                
                <div style="margin-top: 30px;">
                    <a href="leaderboard.html" class="btn btn-primary" style="background: white; color: #11998e;">🏅 查看最終排名</a>
                    <a href="index.html" class="btn btn-secondary">🗺️ 返回地圖</a>
                    <button class="btn btn-secondary" onclick="shareResult()">📤 分享成就</button>
                </div>
            </div>
        </div>
        
        <!-- 失敗畫面 -->
        <div id="fail-screen" style="display: none;">
            <div class="result-box" style="background: rgba(235, 51, 73, 0.2); border: 2px solid #f45c43; border-radius: 15px; padding: 40px;">
                <div class="result-icon">💪</div>
                <div class="result-title" style="color: #f45c43;">挑戰失敗</div>
                <div class="result-stats" id="fail-stats" style="margin: 20px 0;"></div>
                <p style="margin: 20px 0; line-height: 1.8;">
                    別氣餒！Boss挑戰需要熟練掌握所有技巧。<br>
                    建議回顧各島嶼的學習內容，再次挑戰！
                </p>
                <div>
                    <button class="btn btn-warning" onclick="retryBoss()">🔄 再次挑戰</button>
                    <a href="index.html" class="btn btn-secondary">🗺️ 返回地圖複習</a>
                </div>
            </div>
        </div>
    </div>
